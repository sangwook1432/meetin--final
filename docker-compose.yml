services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meetin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetin}
      POSTGRES_DB: ${POSTGRES_DB:-meetin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meetin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Caddy (리버스 프록시 + SSL 자동 발급) ──────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  # ── FastAPI 백엔드 ─────────────────────────────────────────────
  api:
    build: ./apps/api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-meetin}:${POSTGRES_PASSWORD:-meetin}@db:5432/${POSTGRES_DB:-meetin}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # DB 마이그레이션 후 서버 시작
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  # ── Next.js 웹 (모바일 앱 WebView가 로드하는 서버) ─────────────
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.meetinapp.com}
        NEXT_PUBLIC_IMP_CODE: ${NEXT_PUBLIC_IMP_CODE:-}
    restart: unless-stopped
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
